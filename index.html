<script>
// --- CONFIGURATION ---
const myDirectLink = "https://omg10.com/4/10547767";
const botUrl = "https://t.me/enjoy420_bot/Enjoy_all"; 

let adCounts = {};
let currentZoneIndex = 0;
const zoneIds = ['10480960', '10679278', '10679295'];

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// --- FUNCTIONS ---

function checkStartParam() {
    const runScrollLogic = () => {
        // ১. URL থেকে আইডি খুঁজে বের করা
        const params = new URLSearchParams(window.location.search);
        let startParam = params.get('tgWebAppStartParam') || tg.initDataUnsafe.start_param;
        
        if (startParam) {
            const targetId = startParam.trim().toUpperCase();
            
            // ২. ১.৮ সেকেন্ড সময় দেওয়া হয়েছে যাতে ভিডিওগুলো রেন্ডার হতে পারে
            setTimeout(() => {
                const element = document.getElementById(`card-${targetId}`);
                if (element) {
                    // ৩. আগের হাইলাইট রিমুভ করে নতুন করে স্ক্রল এবং হাইলাইট করা
                    element.classList.remove('highlight-card');
                    
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    
                    // রিফ্লো করার জন্য সামান্য গ্যাপ
                    setTimeout(() => {
                        element.classList.add('highlight-card');
                    }, 100);

                    // ৪. ১৫ সেকেন্ড পর হাইলাইট সরিয়ে নেওয়া
                    setTimeout(() => {
                        element.classList.remove('highlight-card');
                    }, 15000); 
                }
            }, 1800); 
        }
    };

    // প্রথমবার যখন অ্যাপ ওপেন হবে তখন চলবে
    runScrollLogic();

    // ইউজার যদি অ্যাপ খোলা অবস্থায় আবার নতুন লিংকে ক্লিক করে
    tg.onEvent('viewportChanged', runScrollLogic); 
}
function triggerSearch(val) {
    const resultDiv = document.getElementById("searchResult");
    
    // ভিডিও ডাটাবেস লোড হয়েছে কি না চেক
    if (typeof videos === 'undefined') return;

    const searchVal = val.trim().toUpperCase();
    
    if (!searchVal || !videos[searchVal]) {
        resultDiv.style.display = "none";
        return;
    }

    resultDiv.style.display = "block";
    const v = videos[searchVal];
    
    // শেয়ার লিংক তৈরি
    const shareLink = `${botUrl}?startapp=${searchVal}`;
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareLink)}`;
    const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareLink)}`;

    resultDiv.innerHTML = `
        <div class='card' style='border:2px solid #ff0000; margin-bottom:30px; box-shadow: 0 0 15px rgba(255,0,0,0.3);'>
            <div class="card-img-box"><img src="${v.image}"></div>
            <div class='card-info'>
                <h3 style="color:#ff0000; font-size:13px; letter-spacing:1px;">⚡ DIRECT MATCH FOUND</h3>
                <h3>${v.title}</h3>
                <div class="meta-row">
                    <span>📅 ${v.date || 'New'}</span>
                    <span class="id-badge" onclick="copyId('${searchVal}')"># ID: ${searchVal} 📋</span>
                </div>
                <div class="stats-bar">
                    <div class="stat-group">
                        <div class="stat-item">👁️ <span id="sv-${searchVal}">0</span></div>
                        <div class="stat-item">📥 <span id="sdn-${searchVal}">0</span></div>
                    </div>
                </div>
                <button class='button' onclick="startUnlock('${searchVal}')" id="btn-s-${searchVal}">🔒 UNLOCK NOW</button>
                
                <div class="share-row">
                    <button class="s-btn btn-link" onclick="copyLink('${searchVal}')">Get Link</button>
                    <button class="s-btn btn-fb" onclick="openShare('${fbUrl}')">Facebook</button>
                    <button class="s-btn btn-wa" onclick="openShare('${waUrl}')">WhatsApp</button>
                </div>
            </div>
        </div>`;

    if(window.db) {
        window.onValue(window.ref(window.db, `stats/${searchVal}`), (snap) => {
            const data = snap.val();
            if(data) {
                if(document.getElementById(`sv-${searchVal}`)) document.getElementById(`sv-${searchVal}`).innerText = data.v || 0;
                if(document.getElementById(`sdn-${searchVal}`)) document.getElementById(`sdn-${searchVal}`).innerText = data.down || 0;
            }
        });
    }
    
    // সার্চ পাওয়ার পর পেজটি হালকা স্ক্রল করে রেজাল্টে নিয়ে যাবে
    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyId(code) {
    navigator.clipboard.writeText(code);
    alert("ID: " + code + " Copied! ✅");
}

function handleVote(code, type) {
    if(!window.db) return;
    const key = `voted_${code}`;
    const oldType = localStorage.getItem(key);
    if (oldType === type) return;

    window.runTransaction(window.ref(window.db, `stats/${code}`), (data) => {
        if (!data) data = { l: 0, d: 0, v: 0, down: 0 };
        if (oldType === 'like') data.l = Math.max(0, data.l - 1);
        if (oldType === 'dislike') data.d = Math.max(0, data.d - 1);
        if (type === 'like') data.l++;
        if (type === 'dislike') data.d++;
        return data;
    });
    localStorage.setItem(key, type);
}

function startUnlock(code) {
    if (!adCounts[code]) adCounts[code] = 3;
    const btn = document.getElementById(`btn-${code}`) || document.getElementById(`btn-s-${code}`);
    
    // ২য় ক্লিকে ডাইরেক্ট লিংক ওপেন করা
    if (adCounts[code] === 2) window.open(myDirectLink, '_blank');

    const activeZone = zoneIds[currentZoneIndex];
    currentZoneIndex = (currentZoneIndex + 1) % zoneIds.length;

    // মেইন ফিক্স: অ্যাড লোড না হলেও যেন কাজ করে
    if (typeof window[`show_${activeZone}`] === 'function') {
        window[`show_${activeZone}`]()
            .then(() => handleAds(code, btn))
            .catch(() => handleAds(code, btn)); 
    } else { 
        handleAds(code, btn); 
    }
}

function handleAds(code, btn) {
    adCounts[code]--;
    if (adCounts[code] > 0) {
        btn.innerText = `🔒 UNLOCK (${adCounts[code]} ADS LEFT)`;
    } else {
        // ডাটাবেসে ভিউ এবং ডাউনলোড আপডেট
        if(window.db) {
            window.runTransaction(window.ref(window.db, `stats/${code}`), (data) => {
                if (!data) data = { v: 0, down: 0, l: 0, d: 0 };
                data.v = (data.v || 0) + 1;
                data.down = (data.down || 0) + 1;
                return data;
            });
        }
        btn.innerText = "▶ PLAY VIDEO";
        btn.style.background = "linear-gradient(90deg, #28a745, #1e7e34)";
        btn.onclick = () => {
            window.location.href = videos[code].final;
        };
    }
}



function filterCat(type, btn) {
    if(btn){
        // সব বাটন থেকে একটিভ ক্লাস সরানো
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        // যে বাটনে ক্লিক করা হয়েছে সেটিকে একটিভ করা
        btn.classList.add('active');
        
        // ক্লিক করা বাটনের নাম নিচে বড় করে দেখানো
        const displayName = document.getElementById("selectedCatName");
        if(displayName) {
            displayName.innerText = btn.innerText.toUpperCase();
        }
    }
    
    const grid = document.getElementById("allVideos");
    grid.innerHTML = ""; 

    Object.keys(videos).forEach(code => {
        const v = videos[code];
        if (type === 'all' || v.cat === type) {
            const userVote = localStorage.getItem(`voted_${code}`);
            
            // --- শেয়ার করার লিংক তৈরি (বট লিংকের সাথে আইডি) ---
            const shareLink = `${botUrl}?startapp=${code}`;
            const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareLink)}`;
            const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareLink)}`;

            const cardHTML = `
            <div class="card" id="card-${code}">
                <div class="card-img-box"><img src="${v.image}" loading="lazy"></div>
                <div class="card-info">
                    <h3>${v.title}</h3>
                    <div class="meta-row">
                        <span>📅 ${v.date}</span>
                        <span class="id-badge" onclick="copyId('${code}')"># ID: ${code} 📋</span>
                    </div>
                    <div class="stats-bar">
                        <div class="stat-group">
                            <div class="stat-item">👁️ <span id="v-${code}">0</span></div>
                            <div class="stat-item">📥 <span id="dn-${code}">0</span></div>
                        </div>
                        <div class="stat-group">
                            <div class="stat-item ${userVote==='like'?'active-like':''}" onclick="handleVote('${code}','like')">👍 <span id="l-${code}">0</span></div>
                            <div class="stat-item ${userVote==='dislike'?'active-dis':''}" onclick="handleVote('${code}','dislike')">👎 <span id="d-${code}">0</span></div>
                        </div>
                    </div>
                    <button class="button" onclick="startUnlock('${code}')" id="btn-${code}">🔒 UNLOCK (3 ADS LEFT)</button>
                    
                    <div class="share-row">
                        <button class="s-btn btn-link" onclick="copyLink('${code}')">Get Link</button>
                        <button class="s-btn btn-fb" onclick="openShare('${fbUrl}')">Facebook</button>
                        <button class="s-btn btn-wa" onclick="openShare('${waUrl}')">WhatsApp</button>
                    </div>
                </div>
            </div>`;
            
            grid.insertAdjacentHTML('beforeend', cardHTML);

            // Firebase থেকে রিয়েলটাইম ডাটা লোড করা
            if(window.db) {
                window.onValue(window.ref(window.db, `stats/${code}`), (snap) => {
                    const val = snap.val();
                    if(val){
                        if(document.getElementById(`v-${code}`)) document.getElementById(`v-${code}`).innerText = val.v || 0;
                        if(document.getElementById(`dn-${code}`)) document.getElementById(`dn-${code}`).innerText = val.down || 0;
                        if(document.getElementById(`l-${code}`)) document.getElementById(`l-${code}`).innerText = val.l || 0;
                        if(document.getElementById(`d-${code}`)) document.getElementById(`d-${code}`).innerText = val.d || 0;
                    }
                });
            }
        }
    });
}

// বাটনগুলোর জন্য প্রয়োজনীয় সাপোর্টিং ফাংশন
function copyLink(code) {
    const link = `${botUrl}?startapp=${code}`;
    navigator.clipboard.writeText(link).then(() => {
        alert("লিংক কপি হয়েছে! ✅");
    });
}

function openShare(url) {
    window.open(url, '_blank');
}


function init() {
    // স্লাইডার লোড
    const topSlider = document.getElementById("topSlider");
    if (topSlider) {
        topSlider.innerHTML = ""; 
        Object.keys(videos).slice(0, 15).forEach(code => {
            topSlider.innerHTML += `<div class="slide-card" onclick="startUnlock('${code}')"><img src="${videos[code].image}"><div class="overlay"><p>${videos[code].title}</p></div></div>`;
        });
    }
    // ক্যাটাগরি লোড
    filterCat('all', document.querySelector('.cat-btn'));
    checkStartParam();
}

// মূল সমাধান: Firebase লোড হওয়া পর্যন্ত অপেক্ষা করা
let checkFirebase = setInterval(() => {
    if (window.db) {
        clearInterval(checkFirebase);
        init();
    }
}, 500);
// ব্রাউজার থেকে আসা কোডটি অটোমেটিক সার্চ এবং স্ক্রল করার জন্য
window.addEventListener('load', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const browserCode = urlParams.get('code'); // ব্রাউজার থেকে আসা কোড
    
    // টেলিগ্রাম লিংকের স্টার্ট প্যারামিটার চেক করা
    let startParam = urlParams.get('tgWebAppStartParam') || (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe ? window.Telegram.WebApp.initDataUnsafe.start_param : null);

    // অগ্রাধিকার (Priority): যদি ব্রাউজার থেকে কোনো কোড আসে তবে সেটাই আগে কাজ করবে
    const finalCode = browserCode || startParam;

    if (finalCode) {
        const targetId = finalCode.trim().toUpperCase();
        
        // ১. সার্চ বক্সে কোডটি বসানো
        document.getElementById('searchInput').value = targetId;
        
        // ২. ভিডিওটি খুঁজে বের করা
        triggerSearch(targetId);

        // ৩. স্ক্রল করার লজিক
        setTimeout(() => {
            const searchResult = document.getElementById("searchResult");
            if (searchResult && searchResult.style.display !== "none") {
                searchResult.scrollIntoView({ behavior: 'smooth', block: 'center' });
                searchResult.firstElementChild.classList.add('highlight-card');
            }
        }, 1000);

        // একবার কাজ হয়ে গেলে URL টা পরিষ্কার করে ফেলা যাতে বারবার একই ভিডিও না আসে
        window.history.replaceState({}, document.title, window.location.pathname);
    }
});
</script>
