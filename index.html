<!DOCTYPE html>
<html lang="bn">
<head>
    <script src="database.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENJOY ALL - Home</title>
    <meta name="theme-color" content="#050505">
    
    <style>
        * {
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            user-select: none;
            box-sizing: border-box;
        }

        body { 
            margin: 0; background: #050505; font-family: 'Segoe UI', Arial, sans-serif; color: white; 
            scroll-behavior: smooth; overflow-x: hidden; 
            touch-action: pan-y;
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(10, 10, 10, 0.9); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); border-bottom: 1px solid #222; }
        
        .logo { 
            font-size: 22px; font-weight: bold; color: #ff0000; letter-spacing: 1px; 
            text-shadow: 0 0 10px rgba(255,0,0,0.5); 
            display: inline-block; 
            animation: logoElastic 3.5s ease-in-out infinite; 
        }
        @keyframes logoElastic { 0%, 100% { transform: scale(1); color: #ff0000; } 50% { transform: scale(1.15) rotate(-3deg); color: #ffffff; text-shadow: 0 0 20px #ff0000; } }
        
        .search { 
            padding: 10px 15px; border-radius: 25px; border: 2.5px solid #333; background: #1a1a1a; color: white; width: 45%; outline: none; transition: 0.3s; 
            animation: rainbowBorder 4s linear infinite; 
        }
        @keyframes rainbowBorder {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            25% { border-color: #ffff00; box-shadow: 0 0 10px #ffff00; }
            50% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            75% { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        }

        .container { padding: 15px; margin-bottom: 80px; }
        .section-title { font-size: 18px; margin: 25px 0 15px; border-left: 4px solid #ff0000; padding-left: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .slider-container { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scrollbar-width: none; }
        .slide-card { min-width: 135px; height: 195px; position: relative; border-radius: 12px; overflow: hidden; border: 1px solid #333; flex-shrink: 0; cursor: pointer; }
        .slide-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .slide-card:hover img { transform: scale(1.1); }
        .slide-card .overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 25px 5px 10px; text-align: center; }
        .slide-card p { margin: 0; font-size: 11px; font-weight: bold; color: #fff; }
        
        .cat-box { display: flex; gap: 12px; margin-bottom: 10px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .cat-btn { background: #111; color: #fff; padding: 10px 22px; border-radius: 30px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.4s; font-weight: 700; border: 2.5px solid #333; text-transform: uppercase; animation: catLighting 4s linear infinite; }
        
        @keyframes catLighting {
            0% { border-color: #ff0000; }
            25% { border-color: #ffff00; }
            50% { border-color: #00ff00; }
            75% { border-color: #00ffff; }
            100% { border-color: #ff0000; }
        }
        
        .cat-btn.active {
            border: none;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400% 400%;
            animation: flowLight 4s linear infinite;
            transform: scale(1.08);
        }

        @keyframes flowLight { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .video-grid { display: grid; grid-template-columns: 1fr; gap: 30px; max-width: 500px; margin: auto; }
        
        /* হাইলাইট কার্ড (নিওন গ্লো) */
        .highlight-card {
            border: 3px solid #ff0000 !important;
            animation: neonGlow 1.5s ease-in-out infinite alternate !important;
            z-index: 10;
            transform: scale(1.02);
        }
        @keyframes neonGlow {
            from { box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000; }
            to { box-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff; }
        }

        .card { background: #121212; border-radius: 20px; overflow: hidden; border: 1px solid #252525; position: relative; transition: 0.4s; }
        .card:hover { transform: translateY(-5px); }
        .card-img-box { position: relative; height: 220px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img-box img { transform: scale(1.1); }
        
        .card-info { padding: 15px; }
        .meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #888; margin-bottom: 10px; }
        .id-badge { background: #1a1a1a; padding: 3px 8px; border-radius: 5px; border: 1px solid #333; color: #ff0000; cursor: pointer; font-weight: bold; }
        
        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 8px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .stat-group { display: flex; gap: 15px; font-size: 12px; font-weight: bold; }
        .stat-item { display: flex; align-items: center; gap: 4px; cursor: pointer; }

        .button { padding: 14px; background: linear-gradient(90deg, #ff0000, #800000); border: none; color: white; width: 100%; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 12px; }
        
        .share-row { display: flex; justify-content: center; gap: 8px; }
        .s-btn { flex: 1; padding: 10px 2px; font-size: 11px; font-weight: bold; border-radius: 8px; color: #ffffff !important; border: 1.5px solid rgba(255,255,255,0.3); cursor: pointer; animation: discoLight 3s infinite; }
        .btn-link { background: #444444 !important; } 
        .btn-fb { background: #1877F2 !important; animation-delay: 0.5s; } 
        .btn-wa { background: #25D366 !important; animation-delay: 1s; } 

        @keyframes discoLight { 
            0%, 100% { filter: brightness(0.8); transform: scale(1); } 
            50% { filter: brightness(1.3); box-shadow: 0 0 10px #fff; transform: scale(1.05); } 
        }

        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.95); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav a { color: #555; text-decoration: none; font-size: 12px; text-align: center; }
        .nav a.active { color: #ff0000; }
    </style>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHNlMGgJAl8gIrWl30n3MYqmxpQDUZ4rs",
            authDomain: "enjoy-all-bot-data.firebaseapp.com",
            projectId: "enjoy-all-bot-data",
            storageBucket: "enjoy-all-bot-data.firebasestorage.app",
            messagingSenderId: "731788215299",
            appId: "1:731788215299:web:76eecfd79e78948133ba36",
            databaseURL: "https://enjoy-all-bot-data-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.ref = ref;
        window.runTransaction = runTransaction;
        window.onValue = onValue;
    </script>
</head>

<body oncontextmenu="return false;">

<div class="header">
    <div class="logo">ENJOY ALL</div>
    <input type="text" class="search" placeholder="Search Code..." id="searchInput">
</div>

<div class="container">
    <div id="searchResult"></div>
    <div id="featuredArea">
        <div class="section-title">Featured <span style="float:right; font-size:11px; color:#666;">Top 15 New</span></div>
        <div class="slider-container" id="topSlider"></div>
    </div>
    <div class="section-title">Categories</div>
    <div class="cat-box">
        <button class="cat-btn active" onclick="filterCat('all', this)">All Episodes</button>
        <button class="cat-btn" onclick="filterCat('tiktok', this)">TikTok Viral</button>
        <button class="cat-btn" onclick="filterCat('others', this)">Others Link</button>
    </div>
    <div id="selectedCatName" style="text-align:center; font-size:20px; margin:15px 0; color:#ff0000; font-weight:900;">ALL EPISODES</div>
    <div class="video-grid" id="allVideos"></div>
</div>

<div class="nav">
    <a href="index.html" class="active">🏠 Home</a>
    <a href="browser.html">🌐 Browser</a>
    <a href="profile.html">👤 Profile</a>
    <a href="support.html">🛠 Support</a>
</div>

<script>
const botUrl = "https://t.me/enjoy420_bot/Enjoy_all"; 
let requiredAdCount = 5;         
let adCounts = {};
let currentZoneIndex = 0;
const zoneIds = ['10480960', '10679278', '10679295'];
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ১. লাইক এবং ডিসলাইক লজিক
function handleVote(code, type) {
    if (localStorage.getItem(`voted_${code}`)) {
        alert("You have already voted! 😊");
        return;
    }
    if (window.db) {
        window.runTransaction(window.ref(window.db, `stats/${code}`), (data) => {
            if (!data) data = { v: 0, down: 0, l: 0, d: 0 };
            if (type === 'like') data.l = (data.l || 0) + 1;
            else data.d = (data.d || 0) + 1;
            return data;
        });
        localStorage.setItem(`voted_${code}`, true);
        alert("Thanks for voting! ✅");
    }
}

// ২. শেয়ারিং লজিক (Get Link, FB, WA)
function copyLink(code) {
    const link = `${botUrl}?startapp=${code}`;
    navigator.clipboard.writeText(link);
    alert("Link Copied to Clipboard! ✅");
}

function openShare(url) {
    window.open(url, '_blank');
}

function copyId(code) { 
    navigator.clipboard.writeText(code); 
    alert("ID: " + code + " Copied! ✅"); 
}

// ৩. সার্চ লজিক এবং ১৫ সেকেন্ড পর হাইলাইট বন্ধ
function triggerSearch(val) {
    const resultDiv = document.getElementById("searchResult");
    if (typeof videos === 'undefined') return;
    const searchVal = val.trim().toUpperCase();
    if (!searchVal || !videos[searchVal]) {
        resultDiv.style.display = "none";
        return;
    }
    resultDiv.style.display = "block";
    const v = videos[searchVal];
    const shareLink = `${botUrl}?startapp=${searchVal}`;
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareLink)}`;
    const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareLink)}`;
    
    resultDiv.innerHTML = `
        <div class='card highlight-card' id='search-card-${searchVal}' style='margin-bottom:30px;'>
            <div class="card-img-box"><img src="${v.image}"></div>
            <div class='card-info'>
                <h3 style="color:#ff0000; font-size:13px;">⚡ DIRECT MATCH FOUND</h3>
                <h3>${v.title}</h3>
                <div class="meta-row">
                    <span>📅 ${timeAgo(v.date)}</span>
                    <span class="id-badge" onclick="copyId('${searchVal}')"># ID: ${searchVal} 📋</span>
                </div>
                <button class='button' onclick="startUnlock('${searchVal}')" id="btn-s-${searchVal}">🔒 UNLOCK (3 ADS LEFT)</button>
                <div class="share-row">
                    <button class="s-btn btn-link" onclick="copyLink('${searchVal}')">Get Link</button>
                    <button class="s-btn btn-fb" onclick="openShare('${fbUrl}')">Facebook</button>
                    <button class="s-btn btn-wa" onclick="openShare('${waUrl}')">WhatsApp</button>
                </div>
            </div>
        </div>`;
    
    // ১৫ সেকেন্ড পর হাইলাইট বন্ধ করার টাইমার
    setTimeout(() => {
        const hc = document.getElementById(`search-card-${searchVal}`);
        if (hc) hc.classList.remove('highlight-card');
    }, 15000);
    
    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ৪. অ্যাড আনলক লজিক
function startUnlock(code) {
    if (!adCounts[code]) adCounts[code] = requiredAdCount;
    const btn = document.getElementById(`btn-${code}`) || document.getElementById(`btn-s-${code}`);
    
    const activeZone = zoneIds[currentZoneIndex];
    currentZoneIndex = (currentZoneIndex + 1) % zoneIds.length;
    
    if (typeof window[`show_${activeZone}`] === 'function') {
        window[`show_${activeZone}`]().then(() => handleAds(code, btn)).catch(() => handleAds(code, btn)); 
    } else { handleAds(code, btn); }
}

function handleAds(code, btn) {
    adCounts[code]--;
    if (adCounts[code] > 0) { 
        btn.innerText = `🔒 UNLOCK (${adCounts[code]} ADS LEFT)`; 
    } else {
        if(window.db) { 
            window.runTransaction(window.ref(window.db, `stats/${code}`), (data) => { 
                if (!data) data = { v: 0, down: 0, l: 0, d: 0 }; 
                data.v = (data.v || 0) + 1; 
                data.down = (data.down || 0) + 1; 
                return data; 
            }); 
        }
        btn.innerText = "▶ PLAY VIDEO";
        btn.style.background = "linear-gradient(90deg, #28a745, #1e7e34)";
        btn.onclick = () => { window.location.href = videos[code].final; };
    }
}

// ৫. ক্যাটাগরি ফিল্টার
function filterCat(type, btn) {
    if(btn){ 
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); 
        btn.classList.add('active'); 
        document.getElementById("selectedCatName").innerText = btn.innerText.toUpperCase(); 
    }
    const grid = document.getElementById("allVideos");
    grid.innerHTML = ""; 
    Object.keys(videos).forEach(code => {
        const v = videos[code];
        if (type === 'all' || v.cat === type) {
            const shareLink = `${botUrl}?startapp=${code}`;
            const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareLink)}`;
            const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareLink)}`;
            
            const cardHTML = `
            <div class="card" id="card-${code}">
                <div class="card-img-box"><img src="${v.image}" loading="lazy"></div>
                <div class="card-info">
                    <h3>${v.title}</h3>
                    <div class="meta-row">
                        <span>📅 ${timeAgo(v.date)}</span>
                        <span class="id-badge" onclick="copyId('${code}')"># ID: ${code} 📋</span>
                    </div>
                    <div class="stats-bar">
                        <div class="stat-group">
                            <div class="stat-item">👁️ <span id="v-${code}">0</span></div>
                            <div class="stat-item">📥 <span id="dn-${code}">0</span></div>
                        </div>
                        <div class="stat-group">
                            <div class="stat-item" onclick="handleVote('${code}','like')">👍 <span id="l-${code}">0</span></div>
                            <div class="stat-item" onclick="handleVote('${code}','dislike')">👎 <span id="d-${code}">0</span></div>
                        </div>
                    </div>
                    <button class="button" onclick="startUnlock('${code}')" id="btn-${code}">🔒 UNLOCK (3 ADS LEFT)</button>
                    <div class="share-row">
                        <button class="s-btn btn-link" onclick="copyLink('${code}')">Get Link</button>
                        <button class="s-btn btn-fb" onclick="openShare('${fbUrl}')">Facebook</button>
                        <button class="s-btn btn-wa" onclick="openShare('${waUrl}')">WhatsApp</button>
                    </div>
                </div>
            </div>`;
            grid.insertAdjacentHTML('beforeend', cardHTML);
            
            if(window.db) { 
                window.onValue(window.ref(window.db, `stats/${code}`), (snap) => { 
                    const val = snap.val(); 
                    if(val){ 
                        if(document.getElementById(`v-${code}`)) document.getElementById(`v-${code}`).innerText = val.v || 0; 
                        if(document.getElementById(`dn-${code}`)) document.getElementById(`dn-${code}`).innerText = val.down || 0; 
                        if(document.getElementById(`l-${code}`)) document.getElementById(`l-${code}`).innerText = val.l || 0; 
                        if(document.getElementById(`d-${code}`)) document.getElementById(`d-${code}`).innerText = val.d || 0; 
                    } 
                }); 
            }
        }
    });
}

// টাইম এগো ফাংশন
function timeAgo(dateString) {
    const now = new Date(); 
    const past = new Date(dateString); 
    const diff = Math.floor((now - past) / 1000);
    if (isNaN(past)) return dateString; 
    if (diff < 60) return "Just Now";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    return past.toLocaleDateString('en-GB'); 
}

// ইনিশিয়ালাইজেশন
function init() {
    const topSlider = document.getElementById("topSlider");
    if (topSlider && typeof videos !== 'undefined') {
        topSlider.innerHTML = ""; 
        Object.keys(videos).slice(0, 15).forEach(code => {
            topSlider.innerHTML += `<div class="slide-card" onclick="startUnlock('${code}')"><img src="${videos[code].image}"><div class="overlay"><p>${videos[code].title}</p></div></div>`;
        });
    }
    filterCat('all', document.querySelector('.cat-btn'));
}

let checkFirebase = setInterval(() => { if (window.db) { clearInterval(checkFirebase); init(); } }, 500);
document.getElementById("searchInput").addEventListener("input", function() { triggerSearch(this.value); });
</script>
</body>
</html>
