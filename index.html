let adCounts = {};
let currentZoneIndex = 0;
const zoneIds = ['10480960', '10679278', '10679295'];
const myDirectLink = "https://omg10.com/4/10547767";

// অ্যাড লক সিস্টেম
function startUnlock(code) {
    if (!adCounts[code]) adCounts[code] = 3;
    const btn = document.getElementById(`btn-${code}`);
    if (adCounts[code] === 2) window.open(myDirectLink, '_blank');
    const activeZone = zoneIds[currentZoneIndex];
    currentZoneIndex = (currentZoneIndex + 1) % zoneIds.length;
    if (typeof window[`show_${activeZone}`] === 'function') {
        window[`show_${activeZone}`]().then(() => handleAds(code, btn)).catch(() => handleAds(code, btn));
    } else { handleAds(code, btn); }
}

function handleAds(code, btn) {
    adCounts[code]--;
    if (adCounts[code] > 0) {
        btn.innerText = `🔒 UNLOCK (${adCounts[code]} ADS LEFT)`;
    } else {
        btn.innerText = "▶ PLAY VIDEO";
        btn.style.background = "linear-gradient(90deg, #28a745, #1e7e34)";
        btn.onclick = () => window.location.href = videos[code].final;
    }
}

// ক্যাটাগরি ফিল্টার
function filterCat(type, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    const grid = document.getElementById("allVideos");
    grid.innerHTML = "";
    if (type === 'others') {
        document.getElementById("listTitle").innerText = "OTHER LINKS";
        otherLinks.forEach(item => {
            grid.innerHTML += `<div class="card"><a href="${item.url}"><img src="${item.image}"></a><div class="card-info" style="text-align:center"><h3>${item.title}</h3><p>Click image to open</p></div></div>`;
        });
    } else {
        document.getElementById("listTitle").innerText = type === 'all' ? "ALL EPISODES" : "TIKTOK VIRAL";
        Object.keys(videos).forEach(code => {
            if (type === 'all' || videos[code].cat === type) {
                grid.innerHTML += `
                <div class="card" id="card-${code}">
                    <div class="card-img-box"><img src="${videos[code].image}"></div>
                    <div class="card-info">
                        <h3>${videos[code].title}</h3>
                        <p>Code: ${code}</p>
                        <button class="button" onclick="startUnlock('${code}')" id="btn-${code}">🔒 UNLOCK (3 ADS LEFT)</button>
                        <div class="share-row">
                            <button class="s-btn btn-tt" onclick="share('tt','${code}')">TikTok</button>
                            <button class="s-btn btn-fb" onclick="share('fb','${code}')">Facebook</button>
                            <button class="s-btn btn-wa" onclick="share('wa','${code}')">WhatsApp</button>
                        </div>
                    </div>
                </div>`;
            }
        });
    }
}

// শেয়ার সিস্টেম
function share(platform, code) {
    const botLink = `https://t.me/enjoy420_bot/app?startapp=${code}`;
    const text = `ভিডিও কোড: ${code}। সরাসরি ভিডিও দেখতে ক্লিক করুন: ${botLink}`;
    if(platform === 'wa') window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    if(platform === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(botLink)}`, '_blank');
    if(platform === 'tt') { navigator.clipboard.writeText(text); alert("লিঙ্ক কপি হয়েছে!"); }
}

// প্রধান ফাংশন যা লিঙ্কের মাধ্যমে ভিডিও খুঁজবে

    const topSlider = document.getElementById("topSlider");
    const codes = Object.keys(videos).slice(0, 15);

        topSlider.innerHTML += `
        <div class="slide-card" onclick="startUnlock('${code}')">
            <img src="${videos[code].image}">
            <div class="overlay"><p>${videos[code].title}</p></div>
        </div>`;
    });
    
    // সব ভিডিও লোড করা (এটি আগে হতে হবে)
    filterCat('all', document.querySelector('.cat-btn'));

    // টেলিগ্রাম থেকে আসা কোড চেক করা
    let codeFromUrl = "";
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // অ্যাপ বড় করবে
            const tgParams = window.Telegram.WebApp.initDataUnsafe;
            if (tgParams && tgParams.start_param) {
                codeFromUrl = tgParams.start_param;
            }
        }
    } catch (e) { console.log("TG Error"); }

    // যদি লিঙ্ক থেকে কোনো কোড পায়
    if (codeFromUrl && videos[codeFromUrl]) {
        // ১.৫ সেকেন্ড অপেক্ষা করা যাতে পেজটি তৈরি হয়ে যায়
        setTimeout(() => {
            const targetCard = document.getElementById(`card-${codeFromUrl}`);
            if (targetCard) {
                // ভিডিও কার্ডের কাছে স্ক্রল করবে
                targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // কার্ডটি লাল/সবুজ বর্ডার দিয়ে হাইলাইট করবে
                targetCard.classList.add('highlight-card');
            }
        }, 1500);
    }
}

// সার্চ সিস্টেম
document.getElementById("searchInput").addEventListener("keyup", function() {
    const val = this.value.trim().toUpperCase();
    const resultDiv = document.getElementById("searchResult");
    if (videos[val]) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<h3 style='text-align:center; color:#ffcc00;'>Search Result:</h3><div class='card'><div class='card-img-box'><img src='"+videos[val].image+"'></div><div class='card-info'><h3>"+videos[val].title+"</h3><p>Code: "+val+"</p><button class='button' onclick=\"startUnlock('"+val+"')\" id='btn-"+val+"'>🔒 UNLOCK (3 ADS LEFT)</button></div></div>";
    } else { resultDiv.style.display = "none"; }
});

init();
</script>
