<script>
const myDirectLink = "https://omg10.com/4/10547767";
const botUrl = "https://t.me/enjoy420_bot/Enjoy_all"; 
let isDirectLinkEnabled = false; 
let requiredAdCount = 4;         
let adCounts = {};
let currentZoneIndex = 0;
const zoneIds = ['10480960', '10679278', '10679295'];

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.enableClosingConfirmation();

document.onkeydown = function(e) {
    if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
};

function triggerSearch(val) {
    const resultDiv = document.getElementById("searchResult");
    if (typeof videos === 'undefined') return;
    const searchVal = val.trim().toUpperCase();
    if (!searchVal || !videos[searchVal]) {
        resultDiv.style.display = "none";
        return;
    }
    resultDiv.style.display = "block";
    const v = videos[searchVal];
    const shareLink = `${botUrl}?startapp=${searchVal}`;
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareLink)}`;
    const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareLink)}`;
    resultDiv.innerHTML = `<div class='card neon-highlight-card' id='search-card-${searchVal}' style='margin-bottom:30px;'><div class="card-img-box"><img src="${v.image}"></div><div class='card-info'><h3 style="color:#ff0000; font-size:13px; letter-spacing:1px;">⚡ DIRECT MATCH FOUND</h3><h3>${v.title}</h3><div class="meta-row"><span>📅 ${timeAgo((v.date || "") + " " + (v.time || ""))}</span><span class="id-badge" onclick="copyId('${searchVal}')"># ID: ${searchVal} 📋</span></div><div class="stats-bar"><div class="stat-group"><div class="stat-item">👁️ <span id="sv-${searchVal}">0</span></div><div class="stat-item">📥 <span id="sdn-${searchVal}">0</span></div></div></div><button class='button' onclick="startUnlock('${searchVal}')" id="btn-s-${searchVal}">🔒 UNLOCK (${requiredAdCount} ADS LEFT)</button><div class="share-row"><button class="s-btn btn-link" onclick="copyLink('${searchVal}')">Get Link</button><button class="s-btn btn-fb" onclick="openShare('${fbUrl}')">Facebook</button><button class="s-btn btn-wa" onclick="openShare('${waUrl}')">WhatsApp</button></div></div></div>`;
    
    setTimeout(() => {
        const sc = document.getElementById(`search-card-${searchVal}`);
        if(sc) sc.classList.remove('neon-highlight-card');
    }, 15000);

    if(window.db) {
        window.onValue(window.ref(window.db, `stats/${searchVal}`), (snap) => {
            const data = snap.val();
            if(data) {
                if(document.getElementById(`sv-${searchVal}`)) document.getElementById(`sv-${searchVal}`).innerText = data.v || 0;
                if(document.getElementById(`sdn-${searchVal}`)) document.getElementById(`sdn-${searchVal}`).innerText = data.down || 0;
            }
        });
    }
    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyId(code) { navigator.clipboard.writeText(code); alert("ID: " + code + " Copied! ✅"); }

function handleVote(code, type) {
    if(!window.db) return;
    const key = `voted_${code}`;
    const oldType = localStorage.getItem(key);
    if (oldType === type) return;
    window.runTransaction(window.ref(window.db, `stats/${code}`), (data) => {
        if (!data) data = { l: 0, d: 0, v: 0, down: 0 };
        if (oldType === 'like') data.l = Math.max(0, data.l - 1);
        if (oldType === 'dislike') data.d = Math.max(0, data.d - 1);
        if (type === 'like') data.l++;
        if (type === 'dislike') data.d++;
        return data;
    });
    localStorage.setItem(key, type);
}

function startUnlock(code) {
    if (!adCounts[code]) adCounts[code] = requiredAdCount;
    const btn = document.getElementById(`btn-${code}`) || document.getElementById(`btn-s-${code}`);
    if (isDirectLinkEnabled && adCounts[code] === 2) { window.open(myDirectLink, '_blank'); }
    const activeZone = zoneIds[currentZoneIndex];
    currentZoneIndex = (currentZoneIndex + 1) % zoneIds.length;
    if (typeof window[`show_${activeZone}`] === 'function') {
        window[`show_${activeZone}`]().then(() => handleAds(code, btn)).catch(() => handleAds(code, btn)); 
    } else { handleAds(code, btn); }
}

function handleAds(code, btn) {
    adCounts[code]--;
    if (adCounts[code] > 0) { btn.innerText = `🔒 UNLOCK (${adCounts[code]} ADS LEFT)`; } else {
        if(window.db) { window.runTransaction(window.ref(window.db, `stats/${code}`), (data) => { if (!data) data = { v: 0, down: 0, l: 0, d: 0 }; data.v = (data.v || 0) + 1; data.down = (data.down || 0) + 1; return data; }); }
        btn.innerText = "▶ PLAY VIDEO";
        btn.style.background = "linear-gradient(90deg, #28a745, #1e7e34)";
        btn.onclick = () => { window.location.href = videos[code].final; };
    }
}

function filterCat(type, btn) {
    if(btn){ 
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); 
        btn.classList.add('active'); 
        const displayName = document.getElementById("selectedCatName"); 
        if(displayName) displayName.innerText = btn.innerText.toUpperCase(); 
    }
    const grid = document.getElementById("allVideos");
    grid.innerHTML = ""; 
    Object.keys(videos).forEach(code => {
        const v = videos[code];
        if (type === 'all' || v.cat === type) {
            const userVote = localStorage.getItem(`voted_${code}`);
            const cardHTML = `<div class="card" id="card-${code}"><div class="card-img-box"><img src="${v.image}" loading="lazy"></div><div class="card-info"><h3>${v.title}</h3><div class="meta-row"><span>📅 ${timeAgo(v.date + " " + (v.time || ""))}</span><span class="id-badge" onclick="copyId('${code}')"># ID: ${code} 📋</span></div><div class="stats-bar"><div class="stat-group"><div class="stat-item">👁️ <span id="v-${code}">0</span></div><div class="stat-item">📥 <span id="dn-${code}">0</span></div></div><div class="stat-group"><div class="stat-item ${userVote==='like'?'active-like':''}" onclick="handleVote('${code}','like')">👍 <span id="l-${code}">0</span></div><div class="stat-item ${userVote==='dislike'?'active-dis':''}" onclick="handleVote('${code}','dislike')">👎 <span id="d-${code}">0</span></div></div></div><button class="button" onclick="startUnlock('${code}')" id="btn-${code}">🔒 UNLOCK (${requiredAdCount} ADS LEFT)</button><div class="share-row"><button class="s-btn btn-link" onclick="copyLink('${code}')">Get Link</button><button class="s-btn btn-fb" onclick="openShare('https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(botUrl + "?startapp=" + code)}')">Facebook</button><button class="s-btn btn-wa" onclick="openShare('https://api.whatsapp.com/send?text=${encodeURIComponent(botUrl + "?startapp=" + code)}')">WhatsApp</button></div></div></div>`;
            grid.insertAdjacentHTML('beforeend', cardHTML);
            if(window.db) { window.onValue(window.ref(window.db, `stats/${code}`), (snap) => { const val = snap.val(); if(val){ if(document.getElementById(`v-${code}`)) document.getElementById(`v-${code}`).innerText = val.v || 0; if(document.getElementById(`dn-${code}`)) document.getElementById(`dn-${code}`).innerText = val.down || 0; if(document.getElementById(`l-${code}`)) document.getElementById(`l-${code}`).innerText = val.l || 0; if(document.getElementById(`d-${code}`)) document.getElementById(`d-${code}`).innerText = val.d || 0; } }); }
        }
    });
}

function copyLink(code) { const link = `${botUrl}?startapp=${code}`; navigator.clipboard.writeText(link).then(() => { alert("লিংক কপি হয়েছে! ✅"); }); }
function openShare(url) { window.open(url, '_blank'); }

function init() {
    const topSlider = document.getElementById("topSlider");
    if (topSlider) {
        topSlider.innerHTML = ""; 
        Object.keys(videos).slice(0, 15).forEach(code => {
            topSlider.innerHTML += `<div class="slide-card" onclick="startUnlock('${code}')"><img src="${videos[code].image}"><div class="overlay"><p>${videos[code].title}</p></div></div>`;
        });
    }
    filterCat('all', document.querySelector('.cat-btn'));
    
    // ভিডিও লিস্ট রেন্ডার হওয়ার পর স্ক্রল চেক (স্মার্ট ডিলে)
    setTimeout(forceScrollToCard, 1500); 
}

let checkFirebase = setInterval(() => { if (window.db) { clearInterval(checkFirebase); init(); } }, 500);

function forceScrollToCard() {
    const urlParams = new URLSearchParams(window.location.search);
    let startParam = urlParams.get('tgWebAppStartParam') || urlParams.get('code');
    
    if (!startParam && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
        startParam = tg.initDataUnsafe.start_param;
    }

    if (startParam) {
        const cleanCode = startParam.trim().toUpperCase();
        const searchInput = document.getElementById('searchInput');
        if(searchInput) searchInput.value = cleanCode;

        const cardElement = document.getElementById(`card-${cleanCode}`);
        if (cardElement) {
            cardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            cardElement.classList.add('neon-highlight-card');
            setTimeout(() => { cardElement.classList.remove('neon-highlight-card'); }, 15000);
        }
    }
}

function timeAgo(dateString) {
    const now = new Date(); const past = new Date(dateString); const diffInSeconds = Math.floor((now - past) / 1000);
    if (isNaN(past)) return dateString; 
    const intervals = { year: 31536000, month: 2592000, week: 604800, day: 86400, hour: 3600, minute: 60 };
    if (diffInSeconds < 60) return "Just Now";
    if (diffInSeconds < intervals.hour) return Math.floor(diffInSeconds / intervals.minute) + " mins ago";
    if (diffInSeconds < intervals.day) return Math.floor(diffInSeconds / intervals.hour) + " hours ago";
    if (diffInSeconds < intervals.week) return Math.floor(diffInSeconds / intervals.day) + " days ago";
    return past.toLocaleDateString('en-GB'); 
}

window.addEventListener('load', () => { 
    let checkData = setInterval(() => { 
        if (window.db && typeof videos !== 'undefined' && document.querySelectorAll('.card').length > 0) { 
            clearInterval(checkData); 
            setTimeout(forceScrollToCard, 1000);
        } 
    }, 500); 
});

document.getElementById("searchInput").addEventListener("input", function() { triggerSearch(this.value.trim().toUpperCase()); });
</script>
