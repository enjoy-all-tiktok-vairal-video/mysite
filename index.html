    <style>
    /* ১. বেসিক সেটআপ ও সিকিউরিটি */
    * { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #050505; font-family: 'Segoe UI', Arial, sans-serif; color: white; scroll-behavior: smooth; overflow-x: hidden; touch-action: pan-y; }

    /* ২. রেইনবো গ্লো সার্চ বার */
    .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(10, 10, 10, 0.9); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); border-bottom: 1px solid #222; }
    .search { 
        padding: 10px 15px; border-radius: 25px; border: 2px solid #333; background: #1a1a1a; color: white; width: 45%; outline: none; 
        transition: 0.3s; animation: rainbowGlow 4s linear infinite; 
    }
    @keyframes rainbowGlow {
        0% { border-color: #ff0000; box-shadow: 0 0 8px rgba(255,0,0,0.5); }
        33% { border-color: #00ff00; box-shadow: 0 0 8px rgba(0,255,0,0.5); }
        66% { border-color: #00ffff; box-shadow: 0 0 8px rgba(0,255,255,0.5); }
        100% { border-color: #ff0000; box-shadow: 0 0 8px rgba(255,0,0,0.5); }
    }

    /* ৩. রানিং লাইট ক্যাটাগরি বাটন */
    .cat-btn.active {
        border: none; position: relative; background: #000; color: #fff; z-index: 1; overflow: hidden;
    }
    .cat-btn.active::before {
        content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
        background: conic-gradient(#ff0000, #00ffff, #ff0000);
        animation: rotateLight 3s linear infinite; z-index: -1;
    }
    .cat-btn.active::after {
        content: ''; position: absolute; inset: 3px; background: #111; border-radius: 30px; z-index: -1;
    }
    @keyframes rotateLight { 100% { transform: rotate(360deg); } }

    /* ৪. রেড-সায়ান নিওন হাইলাইট (১৫ সেকেন্ড) */
    .neon-highlight {
        animation: neonPulse 1.5s infinite alternate !important;
        border: 3px solid #ff0000 !important;
        transform: scale(1.03); z-index: 5;
    }
    @keyframes neonPulse {
        0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000, inset 0 0 10px #ff0000; }
        100% { border-color: #00ffff; box-shadow: 0 0 15px #00ffff, inset 0 0 10px #00ffff; }
    }

    /* ৫. ডিস্কো শেয়ার বাটন */
    .s-btn { animation: discoBtn 2s infinite !important; }
    @keyframes discoBtn {
        0% { filter: hue-rotate(0deg) brightness(1); }
        50% { filter: hue-rotate(180deg) brightness(1.3); transform: scale(1.05); }
        100% { filter: hue-rotate(360deg) brightness(1); }
    }

    /* কার্ড হোভার ও ডিজাইন */
    .card { background: #121212; border-radius: 20px; overflow: hidden; border: 1px solid #252525; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .card:hover { transform: translateY(-10px) scale(1.02); border-color: #ff0000; box-shadow: 0 10px 30px rgba(255,0,0,0.3); }
    .card-img-box { position: relative; height: 200px; overflow: hidden; }
    .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

    .logo { font-size: 22px; font-weight: bold; color: #ff0000; }

<body oncontextmenu="return false;" onkeydown="return false;">

    <div class="cat-box">
        <button class="cat-btn active" onclick="filterCat('all', this)">All Episodes</button>
        <button class="cat-btn" onclick="filterCat('tiktok', this)">TikTok Viral</button>
        <button class="cat-btn" onclick="filterCat('others', this)">Others Link</button>
    </div>

    <div id="allVideos" class="video-grid" style="margin-top:20px;"></div>
</div>

<script>
// --- কনফিগ ---
const myDirectLink = "https://omg10.com/4/10547767";
const botUrl = "https://t.me/enjoy420_bot/Enjoy_all"; 
let isDirectLinkEnabled = false; 
let requiredAdCount = 4; // এখানে সংখ্যা পাল্টাতে পারবে (৪ বা ১০ দিতে পারবে)
let adCounts = {};
let currentZoneIndex = 0;
const zoneIds = ['10480960', '10679278', '10679295'];

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.enableClosingConfirmation(); // সিকিউরিটি: ভুল করে অ্যাপ বন্ধ হওয়া রোধ

// রাইট ক্লিক ও ইনস্পেক্ট ব্লক (কঠোর সিকিউরিটি)
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e) {
    if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
};

function filterCat(type, btn) {
    if(btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    const grid = document.getElementById("allVideos");
    grid.innerHTML = ""; 
    Object.keys(videos).forEach(code => {
        const v = videos[code];
        if (type === 'all' || v.cat === type) {
            renderCard(code, v, grid);
        }
    });
}

function renderCard(code, v, container) {
    const shareLink = `${botUrl}?startapp=${code}`;
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareLink)}`;
    const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareLink)}`;
    
    const html = `
    <div class="card" id="card-${code}">
        <div class="card-img-box"><img src="${v.image}" loading="lazy"></div>
        <div class="card-info">
            <h3>${v.title}</h3>
            <div class="meta-row"><span>📅 ${v.date}</span><span class="id-badge" onclick="copyId('${code}')"># ID: ${code}</span></div>
            <div class="stats-bar" style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:10px;">
                <span>👁️ <span id="v-${code}">0</span></span>
                <span>📥 <span id="dn-${code}">0</span></span>
            </div>
            <button class="button" onclick="startUnlock('${code}')" id="btn-${code}">🔒 UNLOCK (${requiredAdCount} ADS)</button>
            <div class="share-row">
                <button class="button s-btn" style="background:#444" onclick="copyLink('${code}')">Link</button>
                <button class="button s-btn" style="background:#1877F2" onclick="window.open('${fbUrl}')">FB</button>
                <button class="button s-btn" style="background:#25D366" onclick="window.open('${waUrl}')">WA</button>
            </div>
        </div>
    </div>`;
    container.insertAdjacentHTML('beforeend', html);
    loadStats(code);
}

function startUnlock(code) {
    if (!adCounts[code]) adCounts[code] = requiredAdCount;
    const btn = document.getElementById(`btn-${code}`);
    
    // ডাইরেক্ট লিংক লজিক (২টি অ্যাড বাকি থাকলে)
    if (isDirectLinkEnabled && adCounts[code] === 2) { window.open(myDirectLink, '_blank'); }

    const activeZone = zoneIds[currentZoneIndex];
    currentZoneIndex = (currentZoneIndex + 1) % zoneIds.length;
    
    if (typeof window[`show_${activeZone}`] === 'function') {
        window[`show_${activeZone}`]().then(() => handleAds(code, btn)).catch(() => handleAds(code, btn)); 
    } else { handleAds(code, btn); }
}

function handleAds(code, btn) {
    adCounts[code]--;
    if (adCounts[code] > 0) {
        btn.innerText = `🔒 UNLOCK (${adCounts[code]} ADS LEFT)`;
    } else {
        if(window.db) { 
            window.runTransaction(window.ref(window.db, `stats/${code}`), (data) => {
                if (!data) data = { v: 0, down: 0 };
                data.v++; data.down++; return data;
            });
        }
        btn.innerText = "▶ PLAY VIDEO";
        btn.style.background = "linear-gradient(90deg, #28a745, #1e7e34)";
        btn.onclick = () => { window.location.href = videos[code].final; };
    }
}

function handleRouting() {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('tgWebAppStartParam') || urlParams.get('code');
    if (code) {
        const target = code.toUpperCase();
        setTimeout(() => {
            const el = document.getElementById(`card-${target}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('neon-highlight');
                // ১৫ সেকেন্ড পর হাইলাইট বন্ধ হবে
                setTimeout(() => { el.classList.remove('neon-highlight'); }, 15000);
            }
        }, 1000);
    }
}

function loadStats(code) {
    if(window.db) {
        window.onValue(window.ref(window.db, `stats/${code}`), (snap) => {
            const val = snap.val();
            if(val) {
                if(document.getElementById(`v-${code}`)) document.getElementById(`v-${code}`).innerText = val.v || 0;
                if(document.getElementById(`dn-${code}`)) document.getElementById(`dn-${code}`).innerText = val.down || 0;
            }
        });
    }
}

function copyId(c) { navigator.clipboard.writeText(c); alert("ID Copied!"); }
function copyLink(c) { navigator.clipboard.writeText(`${botUrl}?startapp=${c}`); alert("Link Copied!"); }

window.onload = () => {
    let check = setInterval(() => {
        if(window.db && typeof videos !== 'undefined') {
            clearInterval(check);
            filterCat('all');
            handleRouting();
        }
    }, 500);
};
</script>
