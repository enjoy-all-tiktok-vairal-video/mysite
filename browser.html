<!DOCTYPE html>
<html lang="bn">
<head>
  <script src="database.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser - ENJOY ALL Premium</title>
    <style>
        :root {
            --primary-color: #ff0000;
            --bg-dark: #050505;
            --card-bg: #121212;
            --glass: rgba(20, 20, 20, 0.8);
        }

        body { 
            margin:0; 
            background: var(--bg-dark); 
            color:white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding-bottom: 90px;
        }

        /* প্রিমিয়াম হেডার */
        .header { 
            padding: 18px; 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            text-align: center; 
            border-bottom: 1px solid #222;
        }
        .header h1 { 
            margin: 0; 
            font-size: 20px; 
            color: var(--primary-color); 
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        /* সার্চ বক্স আরও সুন্দর */
        .search-container { 
            padding: 15px; 
            background: var(--bg-dark); 
            position: sticky; 
            top: 60px; 
            z-index: 900; 
        }
        .search-box { 
            width: 100%; 
            padding: 14px 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .search-box:focus { 
            border-color: var(--primary-color); 
            background: #222;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.15);
        }

        /* ভিডিও গ্রিড */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 15px; 
        }
        
        /* কার্ড ডিজাইন */
        .item { 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #222; 
            cursor: pointer; 
            position: relative; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .item:active { transform: scale(0.92); }
        
        .thumbnail-container { 
            position: relative; 
            width: 100%; 
            height: 120px; 
            overflow: hidden;
        }
        .item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            transition: 0.5s;
        }
        .item:hover img { transform: scale(1.1); }
        
        /* প্রিমিয়াম প্লে বাটন */
        .play-overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); 
            display: flex; justify-content: center; align-items: center; 
            opacity: 1; transition: 0.3s;
        }
        .play-icon { 
            width: 40px; height: 40px; 
            background: var(--primary-color); 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        .play-icon::after { 
            content: ''; 
            border-top: 8px solid transparent; 
            border-bottom: 8px solid transparent; 
            border-left: 12px solid white; 
            margin-left: 4px; 
        }

        .item p { 
            text-align: center; 
            padding: 12px 5px; 
            margin: 0; 
            font-weight: 600; 
            font-size: 13px; 
            color: #ddd;
            background: linear-gradient(to bottom, #1a1a1a, #121212);
        }
        
        /* প্রিমিয়াম নেভিগেশন বার */
        .nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: rgba(15, 15, 15, 0.9); 
            backdrop-filter: blur(15px);
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            border-top: 1px solid #333; 
            z-index: 2000; 
        }
        .nav a { 
            color: #777; 
            text-decoration: none; 
            font-size: 11px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.3s;
        }
        .nav a.active { color: var(--primary-color); font-weight: bold; }
        .nav a i { font-size: 20px; margin-bottom: 2px; }

        /* গোল্ডেন রেড বর্ডার এনিমেশন (Optional) */
        .item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 15px;
            padding: 1.5px;
            background: linear-gradient(45deg, #ff0000, #ffd700);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Explore Content</h1>
    </div>

    <div class="search-container">
        <input type="text" id="browserSearch" class="search-box" placeholder="সার্চ করুন (নাম বা কোড)...">
    </div>

    <div class="grid" id="videoGrid">
        </div>

    <div class="nav">
        <a href="index.html"><i>🏠</i><span>Home</span></a>
        <a href="browser.html" class="active"><i>🌐</i><span>Browser</span></a>
        <a href="profile.html"><i>👤</i><span>Profile</span></a>
        <a href="support.html"><i>🛠</i><span>Support</span></a>
    </div>

    <script>
    function displayBrowserVideos(filter = "") {
        const grid = document.getElementById("videoGrid");
        if (!grid) return; // গ্রিড না থাকলে ফাংশন বন্ধ হবে
        
        grid.innerHTML = "";

        // videos ডাটাবেসটি আছে কি না চেক করে নেওয়া
        if (typeof videos === 'undefined') {
            grid.innerHTML = "<p style='text-align:center; width:100%; color:red;'>Database error! Please wait...</p>";
            return;
        }

        Object.keys(videos).forEach(code => {
            const v = videos[code];
            if (code.toLowerCase().includes(filter.toLowerCase()) || v.title.toLowerCase().includes(filter.toLowerCase())) {
                const item = document.createElement("div");
                item.className = "item";
                item.onclick = function() {
                    window.location.href = `index.html?code=${code}`;
                };

                item.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${v.image}" alt="${v.title}">
                        <div class="play-overlay">
                            <div class="play-icon"></div>
                        </div>
                    </div>
                    <p>Code: ${code}</p>
                `;
                grid.appendChild(item);
            }
        });
    }

    // সার্চ বক্সের লজিক
    document.getElementById("browserSearch").addEventListener("input", function() {
        displayBrowserVideos(this.value);
    });

    // পেজ লোড হওয়ার পর ডাটা দেখানো
    window.onload = function() {
        // ছোট একটি টাইমআউট দেওয়া হয়েছে যাতে database.js পুরোপুরি কানেক্ট হতে পারে
        setTimeout(() => {
            displayBrowserVideos();
        }, 300);
    };
</script>
</body>
</html>
