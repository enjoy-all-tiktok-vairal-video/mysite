<!DOCTYPE html>
<html lang="bn">
<head>
    <script src="database.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser - ENJOY ALL Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #ff0000;
            --bg-dark: #050505;
            --card-bg: #121212;
            --glass: rgba(20, 20, 20, 0.9);
        }

        body { 
            margin:0; 
            background: var(--bg-dark); 
            color:white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding-bottom: 90px;
        }

        /* প্রিমিয়াম হেডার */
        .header { 
            padding: 18px; 
            background: var(--glass); 
            backdrop-filter: blur(15px);
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            text-align: center; 
            border-bottom: 1px solid #222;
        }
        .header h1 { 
            margin: 0; 
            font-size: 20px; 
            color: var(--primary-color); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        /* সার্চ বক্স */
        .search-container { 
            padding: 15px; 
            background: var(--bg-dark); 
            position: sticky; 
            top: 60px; 
            z-index: 900; 
        }
        .search-box { 
            width: 100%; 
            padding: 14px 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .search-box:focus { 
            border-color: var(--primary-color); 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.15);
        }

        /* ভিডিও গ্রিড */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 15px; 
        }
        
        /* কার্ড ডিজাইন */
        .item { 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #222; 
            cursor: pointer; 
            position: relative; 
            transition: 0.3s;
        }
        .item:active { transform: scale(0.95); }
        
        .thumbnail-container { 
            position: relative; 
            width: 100%; 
            height: 110px; 
            overflow: hidden;
        }
        .item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        /* প্লে আইকন */
        .play-overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.3); 
            display: flex; justify-content: center; align-items: center; 
        }
        .play-icon { 
            width: 35px; height: 35px; 
            background: var(--primary-color); 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }
        .play-icon i { color: white; font-size: 14px; margin-left: 3px; }

        .item p { 
            text-align: center; 
            padding: 10px 5px; 
            margin: 0; 
            font-weight: 600; 
            font-size: 12px; 
            color: #ccc;
            background: #1a1a1a;
        }
        
        /* মেইন ন্যাভিগেশন বার (Home এর সাথে ম্যাচ করা) */
        .nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #111; 
            display: flex; 
            justify-content: space-around; 
            padding: 15px 0; 
            border-top: 1px solid #222; 
            z-index: 2000; 
        }
        .nav a { 
            color: #888; 
            text-decoration: none; 
            font-size: 12px; 
            text-align: center;
            transition: 0.3s;
        }
        .nav a i { font-size: 20px; display: block; margin-bottom: 5px; }
        .nav a.active { color: var(--primary-color); }

        /* কার্ডে গোল্ডেন-রেড বর্ডার */
        .item { border: 1px solid rgba(255, 215, 0, 0.2); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Explore Content</h1>
    </div>

    <div class="search-container">
        <input type="text" id="browserSearch" class="search-box" placeholder="সার্চ করুন (নাম বা কোড)...">
    </div>

    <div class="grid" id="videoGrid"></div>

    <div class="nav">
        <a href="index.html"><i class="fas fa-home"></i>Home</a>
        <a href="browser.html" class="active"><i class="fas fa-th-large"></i>Browser</a>
        <a href="profile.html"><i class="fas fa-user"></i>Profile</a>
        <a href="support.html"><i class="fas fa-headset"></i>Support</a>
    </div>

    <script>
    function displayBrowserVideos(filter = "") {
        const grid = document.getElementById("videoGrid");
        if (!grid) return;
        
        grid.innerHTML = "";

        if (typeof videos === 'undefined') {
            grid.innerHTML = "<p style='text-align:center; width:100%; color:red;'>Database error!</p>";
            return;
        }

        Object.keys(videos).forEach(code => {
            const v = videos[code];
            if (code.toLowerCase().includes(filter.toLowerCase()) || v.title.toLowerCase().includes(filter.toLowerCase())) {
                const item = document.createElement("div");
                item.className = "item";
                item.onclick = function() {
                    window.location.href = `index.html?code=${code}`;
                };

                item.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${v.image}" loading="lazy">
                        <div class="play-overlay">
                            <div class="play-icon"><i class="fas fa-play"></i></div>
                        </div>
                    </div>
                    <p># ${code}</p>
                `;
                grid.appendChild(item);
            }
        });
    }

    document.getElementById("browserSearch").addEventListener("input", function() {
        displayBrowserVideos(this.value);
    });

    window.onload = function() {
        setTimeout(() => {
            displayBrowserVideos();
        }, 300);
    };
    </script>
</body>
</html>
